	<link rel="stylesheet" href="css/admin.css?v=2">
	<style>
	/* 공지사항 입력폼: 인라인 스타일 (확실 적용) */
	#section-notices .notice-form-card {
		border-radius: 16px;
		overflow: hidden;
		box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,196,244,0.15);

		display: flex;
		align-items: center;
		gap: 1rem;
		padding: 1.25rem 2rem;

		border-bottom: 1px solid rgba(0,196,244,0.3);

	#section-notices .notice-form-header-icon {
		width: 48px;
		height: 48px;
		display: flex;
		align-items: center;
		justify-content: center;
		background: rgba(0,196,244,0.3);
		border-radius: 12px;
		color: #00C4F4;
		font-size: 1.35rem;
		box-shadow: 0 4px 12px rgba(0,196,244,0.25);
	}
	#section-notices .notice-form-body {
		padding: 2rem 2.5rem;
		max-width: 720px;
		background: rgba(0,0,0,0.2);
	}
	#section-notices .notice-form-label {
		display: block;
		margin-bottom: 0.6rem;
		font-weight: 600;
		color: #E2E8F0;
		font-size: 0.95rem;
	}
	#section-notices #notice-title,
	#section-notices #notice-content {
		width: 100%;
		box-sizing: border-box;
		padding: 1rem 1.25rem;
		background: #0d1520 !important;
		border: 1px solid rgba(255,255,255,0.15) !important;
		border-radius: 12px;
		color: #fff !important;
		font-size: 1rem;
		font-family: inherit;
	}
	#section-notices #notice-title::placeholder,
	#section-notices #notice-content::placeholder {
		color: rgba(255,255,255,0.4) !important;
	}
	#section-notices #notice-title:focus,
	#section-notices #notice-content:focus {
		outline: none !important;
		border-color: #00C4F4 !important;
		box-shadow: 0 0 0 3px rgba(0,196,244,0.3) !important;
	}
	#section-notices #notice-content {
		min-height: 160px;
		resize: vertical;
		line-height: 1.65;
	}
	#section-notices .notice-form-check-wrap {
		margin-bottom: 2rem;
		padding: 1rem 1.25rem;
		background: rgba(0,0,0,0.25);
		border-radius: 12px;
		border: 1px solid rgba(255,255,255,0.1);
	}
	#section-notices .notice-form-check-label {
		display: inline-flex;
		align-items: center;
		gap: 0.75rem;
		cursor: pointer;
		color: #A4B4C3;
		font-weight: 500;
	}
	#section-notices #notice-important {
		width: 22px;
		height: 22px;
		accent-color: #00C4F4;
		cursor: pointer;
	}
	#section-notices .notice-form-actions {
		display: flex;
		gap: 1rem;
		flex-wrap: wrap;
	}
	#section-notices #notice-submit-btn {
		padding: 0.9rem 2rem;
		border-radius: 12px;
		font-size: 1rem;
		font-weight: 600;
		cursor: pointer;
		border: none;
		background: linear-gradient(135deg, #00C4F4 0%, #00a8d4 100%) !important;
		color: #fff !important;
		box-shadow: 0 4px 16px rgba(0,196,244,0.35);
	}
	#section-notices #notice-submit-btn:hover {
		background: linear-gradient(135deg, #00a8d4 0%, #0090b8 100%) !important;
		box-shadow: 0 6px 20px rgba(0,196,244,0.45);
	}
	#section-notices #notice-cancel-btn {
		padding: 0.9rem 2rem;
		border-radius: 12px;
		font-size: 1rem;
		font-weight: 600;
		cursor: pointer;
		background: rgba(255,255,255,0.08) !important;
		color: #A4B4C3 !important;
		border: 1px solid rgba(255,255,255,0.2) !important;
	}
	#section-notices #notice-cancel-btn:hover {
		background: rgba(255,255,255,0.15) !important;

					<div style="background: rgba(0,196,244,0.1); padding: 1rem 1.5rem; border-radius: 8px; min-width: 140px;">

						<div style="font-size: 0.85rem; opacity: 0.9;">문의 접수</div>

							<th>번호</th>

							<input type="checkbox" id="notice-important" class="notice-form-checkbox">

				<div class="admin-card-header">공지 목록</div>
				<table class="admin-table">
					<thead>
						<tr>
							<th>번호</th>
							<th>제목</th>
							<th>중요</th>
							<th>등록일</th>
							<th>관리</th>
						</tr>
					</thead>
					<tbody id="notices-tbody">
						<tr id="notices-empty-row"><td colspan="5" class="empty" id="notices-empty">불러오는 중...</td></tr>
					</tbody>

	<script>
	(function() {
		var STORAGE_KEY = 'admin_authenticated';
		var GATE_PASSWORD = '@@7979';
		var gate = document.getElementById('admin-gate');
		var content = document.getElementById('admin-content');
		var form = document.getElementById('admin-gate-form');
		var input = document.getElementById('admin-gate-password');
		var errEl = document.getElementById('admin-gate-error');
		if (sessionStorage.getItem(STORAGE_KEY) === '1') {
			if (gate) gate.style.display = 'none';
			if (content) content.style.display = '';
		} else {
			if (gate) gate.style.display = 'flex';
			if (content) content.style.display = 'none';
		}
		if (form) {
			form.addEventListener('submit', function(e) {
				e.preventDefault();
				var pw = input ? input.value : '';
				errEl.textContent = '';
				if (pw === GATE_PASSWORD) {
					sessionStorage.setItem(STORAGE_KEY, '1');
					if (gate) gate.style.display = 'none';
					if (content) content.style.display = '';
				} else {
					errEl.textContent = '비밀번호가 올바르지 않습니다.';
					if (input) input.value = '';
				}
			});
		}
	})();
	</script>
	<script src="../firebase-config.js"></script>
	<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
	<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
	<script>
	(function() {
		var navLinks = document.querySelectorAll('.admin-nav');
		var sections = document.querySelectorAll('.admin-section');

		function showSection(sectionId) {
			sections.forEach(function(s) {
				s.classList.toggle('active', s.id === 'section-' + sectionId);
			});
			navLinks.forEach(function(a) {
				a.classList.toggle('active', a.getAttribute('data-section') === sectionId);
			});
		}

		navLinks.forEach(function(a) {
			a.addEventListener('click', function(e) {
				e.preventDefault();
				showSection(a.getAttribute('data-section'));
			});
		});

		var hash = window.location.hash.replace('#', '') || 'dashboard';
		showSection(hash);
		window.addEventListener('hashchange', function() {
			showSection(window.location.hash.replace('#', '') || 'dashboard');
		});
	})();
	</script>
	<script>
	(function() {
		var config = typeof window.FIREBASE_CONFIG !== 'undefined' ? window.FIREBASE_CONFIG : null;
		if (!config || !config.apiKey || config.apiKey.indexOf('YOUR_') === 0) {
			document.getElementById('forms-empty').textContent = 'Firebase 설정 후 문의 목록이 표시됩니다.';
			document.getElementById('members-empty').textContent = 'Firebase 설정 후 회원 목록이 표시됩니다.';
			return;
		}
		try {
			firebase.initializeApp(config);
			var db = firebase.firestore();
			var formsRef = db.collection('sites').doc('10trix').collection('forms');
			var usersRef = db.collection('sites').doc('10trix').collection('users');
			var statMembers = document.getElementById('stat-members');
			var statForms = document.getElementById('stat-forms');

			var FORMS_PER_PAGE = 10;
			var allFormsDocs = [];
			var currentFormsPage = 1;

			function escapeHtml(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

			function renderFormsPage() {
				var tbody = document.getElementById('forms-tbody');
				var emptyRow = document.getElementById('forms-empty');
				var emptyTr = emptyRow.closest ? emptyRow.closest('tr') : emptyRow.parentNode;
				var total = allFormsDocs.length;
				if (total === 0) {
					emptyRow.textContent = '접수된 문의가 없습니다.';
					if (emptyTr) emptyTr.style.display = '';
					if (statForms) statForms.textContent = '0';
					document.getElementById('forms-paging').innerHTML = '';
					return;
				}
				if (statForms) statForms.textContent = String(total);
				var totalPages = Math.max(1, Math.ceil(total / FORMS_PER_PAGE));
				if (currentFormsPage > totalPages) currentFormsPage = totalPages;
				var start = (currentFormsPage - 1) * FORMS_PER_PAGE;
				var pageDocs = allFormsDocs.slice(start, start + FORMS_PER_PAGE);
				if (emptyTr) emptyTr.style.display = 'none';
				var toRemove = [];
				for (var n = tbody.firstChild; n; n = n.nextSibling) { if (n !== emptyTr) toRemove.push(n); }
				toRemove.forEach(function(r) { tbody.removeChild(r); });
				var MAX_MSG_PREVIEW = 40;
				pageDocs.forEach(function(doc, idx) {
					var d = doc.data();
					var docId = doc.id;
					var globalIndex = total - (start + idx);
					var titleText = d.title || (d.message ? (d.message.length <= MAX_MSG_PREVIEW ? d.message : d.message.slice(0, MAX_MSG_PREVIEW) + '…') : '-');
					var rawMsg = d.message || '-';
					var fullMsgEscaped = escapeHtml(rawMsg);
					var dateStr = d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().toLocaleString('ko-KR') : '-';
					var replyStatusClass = d.adminReply ? 'admin-reply-status-answered' : 'admin-reply-status-pending';
					var replyStatusText = d.adminReply ? '답변됨' : '미답변';
					var tr = document.createElement('tr');
					tr.innerHTML = '<td>' + globalIndex + '</td><td>' + escapeHtml(d.name || '-') + '</td><td>' + escapeHtml(d.email || '-') + '</td><td class="admin-msg-cell" title="클릭하면 답변 입력란 펼치기">' + escapeHtml(titleText) + '</td><td>' + dateStr + '</td><td class="admin-reply-cell" title="클릭하면 답변 입력"><span class="admin-reply-status ' + replyStatusClass + '">' + escapeHtml(replyStatusText) + '</span></td>';
					tbody.insertBefore(tr, emptyTr);
					var detailTr = document.createElement('tr');
					detailTr.className = 'admin-msg-detail-row';
					detailTr.style.display = 'none';
					var detailTd = document.createElement('td');
					detailTd.colSpan = 6;
					detailTd.className = 'admin-msg-detail-cell';
					detailTd.setAttribute('data-doc-id', docId);
					var titleBlock = d.title ? '<div class="admin-detail-title"><strong>제목</strong> ' + escapeHtml(d.title) + '</div>' : '';
					detailTd.innerHTML = titleBlock + '<div class="admin-detail-label">내용</div><pre class="admin-message-body">' + fullMsgEscaped + '</pre>' +
						'<div class="admin-reply-form"><label class="admin-reply-label">답변 입력 (마이페이지에서 사용자에게 표시됩니다)</label>' +
						'<textarea class="admin-reply-textarea" rows="3" placeholder="답변을 입력하세요">' + escapeHtml(d.adminReply || '') + '</textarea>' +
						'<button type="button" class="admin-reply-save-btn">답변 저장</button></div>';
					detailTr.appendChild(detailTd);
					tbody.insertBefore(detailTr, emptyTr);
				});
				var pagingEl = document.getElementById('forms-paging');
				if (total === 0) {
					pagingEl.innerHTML = '';
				} else {
					var pagingHtml = '';
					pagingHtml += '<button type="button" class="admin-paging-btn" data-page="prev" ' + (currentFormsPage <= 1 ? 'disabled' : '') + '>이전</button>';
					for (var p = 1; p <= totalPages; p++) {
						pagingHtml += '<button type="button" class="admin-paging-btn admin-paging-num' + (p === currentFormsPage ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
					}
					pagingHtml += '<button type="button" class="admin-paging-btn" data-page="next" ' + (currentFormsPage >= totalPages ? 'disabled' : '') + '>다음</button>';
					pagingEl.innerHTML = pagingHtml;
					pagingEl.querySelectorAll('.admin-paging-btn').forEach(function(btn) {
						btn.addEventListener('click', function() {
							var page = btn.getAttribute('data-page');
							if (page === 'prev' && currentFormsPage > 1) { currentFormsPage--; renderFormsPage(); }
							else if (page === 'next' && currentFormsPage < totalPages) { currentFormsPage++; renderFormsPage(); }
							else if (page !== 'prev' && page !== 'next') { var num = parseInt(page, 10); if (num >= 1 && num <= totalPages) { currentFormsPage = num; renderFormsPage(); } }
						});
					});
				}
			}

			function toggleDetailRow(cell) {
				var dataTr = cell.closest('tr');
				var nextTr = dataTr && dataTr.nextElementSibling;
				if (nextTr && nextTr.classList.contains('admin-msg-detail-row')) {
					var isHidden = nextTr.style.display === 'none';
					nextTr.style.display = isHidden ? 'table-row' : 'none';
					var msgCell = dataTr.querySelector('.admin-msg-cell');
					var replyCell = dataTr.querySelector('.admin-reply-cell');
					if (msgCell) msgCell.setAttribute('title', isHidden ? '클릭하면 접기' : '클릭하면 답변 입력란 펼치기');
					if (replyCell) replyCell.setAttribute('title', isHidden ? '클릭하면 접기' : '클릭하면 답변 입력');
				}
			}

			function renderForms(snap) {
				allFormsDocs = snap.docs || [];
				currentFormsPage = 1;
				renderFormsPage();
			}

			var formsTbody = document.getElementById('forms-tbody');
			if (formsTbody) {
				formsTbody.addEventListener('click', function(e) {
					var cell = e.target.closest && (e.target.closest('.admin-msg-cell') || e.target.closest('.admin-reply-cell'));
					if (!cell) return;
					toggleDetailRow(cell);
				});
				formsTbody.addEventListener('click', function(e) {
					var btn = e.target.closest && e.target.closest('.admin-reply-save-btn');
					if (!btn) return;
					var cell = btn.closest('.admin-msg-detail-cell');
					if (!cell) return;
					var docId = cell.getAttribute('data-doc-id');
					var textarea = cell.querySelector('.admin-reply-textarea');
					var reply = textarea && textarea.value ? textarea.value.trim() : '';
					if (!docId) return;
					btn.disabled = true;
					btn.textContent = '저장 중...';
					formsRef.doc(docId).update({
						adminReply: reply,
						adminReplyAt: firebase.firestore.FieldValue.serverTimestamp()
					}).then(function() {
						btn.disabled = false;
						btn.textContent = '답변 저장';
						alert('답변이 저장되었습니다.');
						var detailTr = cell.closest('tr');
						if (detailTr) detailTr.style.display = 'none';
						var dataTr = detailTr && detailTr.previousElementSibling;
						if (dataTr) {
							var statusEl = dataTr.querySelector('.admin-reply-status');
							if (statusEl) {
								statusEl.textContent = reply ? '답변됨' : '미답변';
								statusEl.className = 'admin-reply-status ' + (reply ? 'admin-reply-status-answered' : 'admin-reply-status-pending');
							}
						}
					}).catch(function(err) {
						alert('저장에 실패했습니다.');
						btn.disabled = false;
						btn.textContent = '답변 저장';
						console.warn(err);
					});
				});
			}

			function renderMembers(snap) {
				var tbody = document.getElementById('members-tbody');
				var emptyRow = document.getElementById('members-empty');
				var emptyTr = emptyRow.closest ? emptyRow.closest('tr') : emptyRow.parentNode;
				var docs = snap.docs;
				if (docs.length === 0) {
					emptyRow.textContent = '등록된 회원이 없습니다.';
					if (emptyTr) emptyTr.style.display = '';
					if (statMembers) statMembers.textContent = '0';
					return;
				}
				if (emptyTr) emptyTr.style.display = 'none';
				if (statMembers) statMembers.textContent = String(docs.length);
				function escapeHtml(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
				docs.forEach(function(doc, i) {
					var d = doc.data();
					var dateStr = d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().toLocaleString('ko-KR') : '-';
					var note = d.signupType === '10shopping' ? '10쇼핑 연동' : '신규';
					var tr = document.createElement('tr');
					tr.innerHTML = '<td>' + (docs.length - i) + '</td><td>' + escapeHtml(d.displayName || '-') + '</td><td>' + escapeHtml(d.email || '-') + '</td><td>' + dateStr + '</td><td>' + escapeHtml(note) + '</td>';
					tbody.insertBefore(tr, emptyTr);
				});
			}
			function setFormsError(msg) {
				document.getElementById('forms-empty').textContent = msg;
				if (document.getElementById('forms-empty').closest) document.getElementById('forms-empty').closest('tr').style.display = '';
			}
			function setMembersError(msg) {
				document.getElementById('members-empty').textContent = msg;
				if (document.getElementById('members-empty').closest) document.getElementById('members-empty').closest('tr').style.display = '';
			}

			Promise.all([
				formsRef.orderBy('createdAt', 'desc').get(),
				usersRef.orderBy('createdAt', 'desc').get()
			]).then(function(results) {
				renderForms(results[0]);
				renderMembers(results[1]);
			}).catch(function(err) {
				setFormsError('문의 목록을 불러오지 못했습니다.');
				setMembersError('회원 목록을 불러오지 못했습니다.');
				console.warn(err);
			});
		} catch (e) {
			document.getElementById('forms-empty').textContent = 'Firebase 연동 오류.';
			if (document.getElementById('members-empty')) document.getElementById('members-empty').textContent = 'Firebase 연동 오류.';
			console.warn(e);
		}
	})();
	</script>
	<script>
	(function() {
		var config = typeof window.FIREBASE_CONFIG !== 'undefined' ? window.FIREBASE_CONFIG : null;
		if (!config || !config.apiKey || config.apiKey.indexOf('YOUR_') === 0) {
			var emptyEl = document.getElementById('notices-empty');
			if (emptyEl) emptyEl.textContent = 'Firebase 설정 후 공지 목록이 표시됩니다.';
			return;
		}
		try {
			var db = firebase.firestore();
			var noticesRef = db.collection('sites').doc('10trix').collection('notices');
			var tbody = document.getElementById('notices-tbody');
			var titleInput = document.getElementById('notice-title');
			var contentInput = document.getElementById('notice-content');
			var importantInput = document.getElementById('notice-important');
			var editIdInput = document.getElementById('notice-edit-id');
			var submitBtn = document.getElementById('notice-submit-btn');
			var cancelBtn = document.getElementById('notice-cancel-btn');

			function escapeHtml(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

			var emptyTr = document.getElementById('notices-empty-row');
			var emptyTd = document.getElementById('notices-empty');

			function loadNotices() {
				noticesRef.get().then(function(snap) {
					var docs = snap.docs;
					docs.sort(function(a, b) {
						var da = a.data(), db = b.data();
						var impA = da.important === true ? 1 : 0;
						var impB = db.important === true ? 1 : 0;
						if (impB !== impA) return impB - impA;
						var tA = da.createdAt && da.createdAt.toDate ? da.createdAt.toDate().getTime() : 0;
						var tB = db.createdAt && db.createdAt.toDate ? db.createdAt.toDate().getTime() : 0;
						return tB - tA;
					});
					var dataRows = tbody.querySelectorAll('tr:not(#notices-empty-row)');
					dataRows.forEach(function(r) { tbody.removeChild(r); });
					if (docs.length === 0) {
						if (emptyTr) emptyTr.style.display = '';
						if (emptyTd) emptyTd.textContent = '등록된 공지가 없습니다.';
						return;
					}
					if (emptyTr) emptyTr.style.display = 'none';
					docs.forEach(function(doc, i) {
						var d = doc.data();
						var dateStr = d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().toLocaleString('ko-KR') : '-';
						var importantBadge = d.important ? '<span class="notice-badge-important">중요</span>' : '-';
						var tr = document.createElement('tr');
						tr.innerHTML = '<td>' + (docs.length - i) + '</td><td>' + escapeHtml(d.title || '-') + '</td><td>' + importantBadge + '</td><td>' + dateStr + '</td><td><button type="button" class="admin-btn admin-btn-sm notice-edit-btn" data-id="' + escapeHtml(doc.id) + '">수정</button> <button type="button" class="admin-btn admin-btn-sm notice-del-btn" data-id="' + escapeHtml(doc.id) + '" style="background:#c44;">삭제</button></td>';
						tbody.insertBefore(tr, emptyTr);
					});
					tbody.querySelectorAll('.notice-edit-btn').forEach(function(btn) {
						btn.addEventListener('click', function() {
							var id = btn.getAttribute('data-id');
							noticesRef.doc(id).get().then(function(docSnap) {
								if (!docSnap.exists) return;
								var d = docSnap.data();
								if (titleInput) titleInput.value = d.title || '';
								if (contentInput) contentInput.value = d.content || '';
								if (importantInput) importantInput.checked = d.important === true;
								if (editIdInput) editIdInput.value = id;
								if (submitBtn) submitBtn.textContent = '수정';
							});
						});
					});
					tbody.querySelectorAll('.notice-del-btn').forEach(function(btn) {
						btn.addEventListener('click', function() {
							if (!confirm('이 공지를 삭제할까요?')) return;
							var id = btn.getAttribute('data-id');
							noticesRef.doc(id).delete().then(function() { loadNotices(); }).catch(function(err) {
								alert('삭제에 실패했습니다.');
								console.warn(err);
							});
						});
					});
				}).catch(function(err) {
					if (emptyTd) emptyTd.textContent = '공지 목록을 불러오지 못했습니다.';
					if (emptyTr) emptyTr.style.display = '';
					console.warn(err);
				});
			}

			if (submitBtn) {
				submitBtn.addEventListener('click', function() {
					var title = titleInput ? titleInput.value.trim() : '';
					var content = contentInput ? contentInput.value.trim() : '';
					if (!title) { alert('제목을 입력하세요.'); return; }
					var important = importantInput ? importantInput.checked : false;
					var id = editIdInput ? editIdInput.value.trim() : '';
					if (id) {
						noticesRef.doc(id).update({ title: title, content: content, important: important, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(function() {
							alert('수정되었습니다.');
							if (editIdInput) editIdInput.value = '';
							if (titleInput) titleInput.value = '';
							if (contentInput) contentInput.value = '';
							if (importantInput) importantInput.checked = false;
							if (submitBtn) submitBtn.textContent = '등록';
							loadNotices();
						}).catch(function(err) { alert('수정에 실패했습니다.'); console.warn(err); });
					} else {
						noticesRef.add({ title: title, content: content, important: important, createdAt: firebase.firestore.FieldValue.serverTimestamp() }).then(function() {
							alert('등록되었습니다.');
							if (titleInput) titleInput.value = '';
							if (contentInput) contentInput.value = '';
							if (importantInput) importantInput.checked = false;
							loadNotices();
						}).catch(function(err) { alert('등록에 실패했습니다.'); console.warn(err); });
					}
				});
			}
			if (cancelBtn) {
				cancelBtn.addEventListener('click', function() {
					if (editIdInput) editIdInput.value = '';
					if (titleInput) titleInput.value = '';
					if (contentInput) contentInput.value = '';
					if (importantInput) importantInput.checked = false;
					if (submitBtn) submitBtn.textContent = '등록';
				});
			}

			loadNotices();
		} catch (e) {
			if (document.getElementById('notices-empty')) document.getElementById('notices-empty').textContent = 'Firebase 연동 오류.';
			console.warn(e);
		}
	})();
	</script>
</body>
